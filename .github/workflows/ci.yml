#
# CI workflow for cloudsmith-module-hello.
#
# Triggers:
#   - Push to main  → build + push :latest and :<sha> tags to ghcr.io
#   - Pull requests → build only (no push), validate Dockerfile and manifest
#
# Image tags published on main push:
#   ghcr.io/cloudsmith-cloud/cloudsmith-module-hello:<git-sha>
#   ghcr.io/cloudsmith-cloud/cloudsmith-module-hello:latest

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cloudsmith-cloud/cloudsmith-module-hello

jobs:
  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # Required to push to ghcr.io

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # Log in to GitHub Container Registry using the built-in GITHUB_TOKEN.
      # This grants push access to ghcr.io/cloudsmith-cloud/ for images owned by
      # the cloudsmith-cloud org, provided the repo has packages:write permission.
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract image metadata (tags, labels) following OCI conventions.
      # On main push: tags with the git SHA and "latest".
      # On PR:        tags with "pr-<number>" only (no push).
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Set up Docker Buildx for multi-platform builds.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build (and conditionally push) the image.
      # NUGET_SOURCE_TOKEN allows the build stage to restore CloudSmith.Sdk from
      # the GitHub Packages NuGet feed. The GITHUB_TOKEN has read:packages on the
      # cloudsmith-cloud org, which is sufficient for restore.
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NUGET_SOURCE_TOKEN=${{ secrets.GITHUB_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # OCI labels required for CloudSmith module catalog discovery.
          # The platform's GhcrModuleCatalog filters packages by org.cloudsmith.module=true.
          labels: |
            org.cloudsmith.module=true
            org.cloudsmith.module.id=cloudsmith-module-hello
            org.cloudsmith.module.version=0.1.0
            org.opencontainers.image.source=https://github.com/cloudsmith-cloud/cloudsmith-module-hello
            org.opencontainers.image.description=CloudSmith Hello World reference module
            org.opencontainers.image.licenses=Apache-2.0

      # Validate the module manifest is valid JSON on every run.
      - name: Validate module.json
        run: |
          echo "Validating module.json..."
          python3 -c "import json, sys; json.load(open('module.json')); print('module.json is valid JSON')"

      # Print the manifest contents for easy debugging in CI logs.
      - name: Print module manifest
        run: cat module.json
